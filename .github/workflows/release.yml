name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-15   # Xcode 16 / Swift 6 + Apple Silicon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build NeelSpeak.app
        run: bash Scripts/build-app.sh
        env:
          CONFIG: release

      - name: Build DMG
        run: |
          STAGING=$(mktemp -d)
          cp -R NeelSpeak.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create -volname "NeelSpeak" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            NeelSpeak.dmg
          rm -rf "$STAGING"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: NeelSpeak ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: NeelSpeak.dmg
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
